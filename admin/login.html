<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — TableBot</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--paper:#fff;--ink:#0a0a0a;--grey-1:#e7e9ee;--grey-2:#c5cad4;--grey-3:#6b7280;--red:#ff0000;--red:#dc2626;--sans:'Inter',Arial,sans-serif;--mono:'JetBrains Mono',monospace}
    body{font-family:var(--sans);background:var(--ink);color:var(--paper);min-height:100vh;display:flex;align-items:center;justify-content:center}
    a{color:inherit;text-decoration:none}
    button{font-family:var(--sans);cursor:pointer}
    .card{width:100%;max-width:400px;padding:48px 40px}
    .logo{font-weight:900;font-size:22px;letter-spacing:-.5px;text-transform:uppercase;margin-bottom:6px}
    .logo span{color:var(--red)}
    .tag{font-family:var(--mono);font-size:11px;color:var(--grey-3);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:40px;display:flex;align-items:center;gap:8px}
    .tag::before{content:"";width:18px;height:1px;background:var(--red)}
    h1{font-size:26px;font-weight:900;text-transform:uppercase;letter-spacing:-1px;margin-bottom:32px}
    .field{margin-bottom:22px}
    label{display:block;font-family:var(--mono);font-size:10px;font-weight:600;color:var(--grey-3);margin-bottom:8px;text-transform:uppercase;letter-spacing:1px}
    input{width:100%;padding:12px 0;border:none;border-bottom:1px solid #333;font-size:15px;font-family:var(--sans);color:var(--paper);background:transparent}
    input:focus{outline:none;border-bottom:2px solid var(--red);padding-bottom:11px}
    .btn{width:100%;padding:15px;background:var(--red);color:var(--paper);border:1px solid var(--red);font-family:var(--mono);font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;margin-top:10px;transition:all .15s}
    .btn:hover{background:var(--paper);color:var(--ink)}
    .btn:disabled{opacity:.5;cursor:not-allowed}
    .error{border:1px solid var(--red);color:#fca5a5;padding:11px 14px;font-size:12px;font-family:var(--mono);margin-bottom:18px;display:none;text-transform:uppercase;letter-spacing:.5px}
    .error.show{display:block}
    .hint{margin-top:24px;font-family:var(--mono);font-size:10.5px;color:#444;line-height:1.6;border-top:1px solid #222;padding-top:18px}
    .spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:8px}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Table<span>·</span>Bot</div>
  <div class="tag">Admin Console</div>
  <h1>Sign In</h1>
  <div class="error" id="err"></div>
  <div class="field"><label>Admin Email</label><input type="email" id="email" placeholder="admin@tablebot.ai"/></div>
  <div class="field"><label>Password</label><input type="password" id="password" placeholder="••••••••"/></div>
  <button class="btn" id="login-btn" onclick="doLogin()">Sign In to Admin</button>
  <div class="hint">DEMO CREDENTIALS<br/>admin@tablebot.ai / admin1234</div>
</div>

<script>
async function doLogin() {
  const email = document.getElementById("email").value.trim();
  const pw    = document.getElementById("password").value;
  const err   = document.getElementById("err");
  const btn   = document.getElementById("login-btn");
  err.classList.remove("show");
  if (!email || !pw) { err.textContent = "Please fill in all fields."; err.classList.add("show"); return; }
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Signing in…';
  try {
    const res = await fetch("/api/admin/login", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ email, password: pw })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || "Login failed");
    localStorage.setItem("tb_admin_token", data.token);
    localStorage.setItem("tb_admin_user", JSON.stringify(data.user));
    window.location.href = "index.html";
  } catch(e) {
    err.textContent = e.message;
    err.classList.add("show");
    btn.disabled = false;
    btn.innerHTML = "Sign In to Admin";
  }
}
document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });
</script>
</body>
</html>
